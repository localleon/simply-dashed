name: ci

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  CHART_PATH: charts/simply-dashed

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Format check
        run: test -z "$(gofmt -l .)"

      - name: Verify vendored module tree
        run: |
          go mod vendor
          git diff --exit-code -- go.mod go.sum vendor

      - name: Verify vendored frontend assets
        run: |
          test -f internal/server/static/vendor/normalize-8.0.1.min.css
          test -f internal/server/static/vendor/milligram-1.4.1.min.css
          test -f internal/server/static/vendor/htmx-2.0.4.min.js

      - name: Test
        run: go test -mod=vendor ./...

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint $CHART_PATH

      - name: Render chart
        run: helm template simply-dashed $CHART_PATH > /tmp/simply-dashed-rendered.yaml

  build-release:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          while read -r tag; do
            [ -n "$tag" ] || continue
            cosign sign --yes "${tag}@${{ steps.build.outputs.digest }}"
          done <<< "${{ steps.meta.outputs.tags }}"

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          vuln-type: os,library

      - name: Generate text vulnerability report
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: table
          output: trivy-report.txt
          severity: CRITICAL,HIGH
          vuln-type: os,library

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Upload vulnerability report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: |
            trivy-results.sarif
            trivy-report.txt

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Package chart
        run: |
          helm package $CHART_PATH --destination .cr-release-packages

      - name: Login Helm registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u "${{ github.actor }}" --password-stdin

      - name: Push OCI chart
        run: |
          helm push .cr-release-packages/simply-dashed-*.tgz oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts
