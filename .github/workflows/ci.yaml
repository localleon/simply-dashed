name: ci

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  CHART_PATH: charts/simply-dashed

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-go@v6.5.0
        with:
          go-version-file: go.mod

      - name: Format check
        run: test -z "$(find . -path ./vendor -prune -o -name '*.go' -print0 | xargs -0 gofmt -l)"

      - name: Verify vendored module tree
        run: |
          go mod vendor
          git diff --exit-code -- go.mod go.sum vendor

      - name: Verify vendored frontend assets
        run: |
          test -f internal/server/static/vendor/normalize-8.0.1.min.css
          test -f internal/server/static/vendor/milligram-1.4.1.min.css
          test -f internal/server/static/vendor/htmx-2.0.10.min.js

      - name: Test
        run: go test -mod=vendor ./...

      - name: Install Helm
        uses: azure/setup-helm@v5.0.1

      - name: Lint chart
        run: helm lint $CHART_PATH

      - name: Render chart
        run: helm template simply-dashed $CHART_PATH > /tmp/simply-dashed-rendered.yaml

  build-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
      packages: write
      id-token: write
      security-events: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Derive release version
        id: version
        run: |
          echo "release_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "release_version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v4.1.0

      - uses: docker/setup-buildx-action@v4.1.0

      - name: Login to GHCR
        uses: docker/login-action@v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.release_tag }}
            type=raw,value=latest

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ steps.version.outputs.release_tag }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: false

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign image
        run: |
          while read -r tag; do
            [ -n "$tag" ] || continue
            cosign sign --yes "${tag}@${{ steps.build.outputs.digest }}"
          done <<< "${{ steps.meta.outputs.tags }}"

      - name: Generate SBOM
        uses: anchore/sbom-action@v0.24.0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          output-file: simply-dashed-sbom.spdx.json
          format: spdx-json
          upload-artifact: false
          upload-release-assets: false

      - name: Attest SBOM with cosign
        run: |
          cosign attest --yes \
            --predicate simply-dashed-sbom.spdx.json \
            --type spdxjson \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          vuln-type: os,library

      - name: Generate text vulnerability report
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: table
          output: trivy-report.txt
          severity: CRITICAL,HIGH
          vuln-type: os,library

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4.36.2
        with:
          sarif_file: trivy-results.sarif

      - name: Upload vulnerability report
        uses: actions/upload-artifact@v7.0.1
        with:
          name: trivy-report
          path: |
            trivy-results.sarif
            trivy-report.txt
            simply-dashed-sbom.spdx.json

      - name: Install Helm
        uses: azure/setup-helm@v5.0.1

      - name: Package chart
        run: |
          helm package "$CHART_PATH" \
            --version "${{ steps.version.outputs.release_version }}" \
            --app-version "${{ steps.version.outputs.release_tag }}" \
            --destination .cr-release-packages

      - name: Login Helm registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u "${{ github.actor }}" --password-stdin

      - name: Push OCI chart
        run: |
          helm push ".cr-release-packages/simply-dashed-${{ steps.version.outputs.release_version }}.tgz" oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > /tmp/release-notes.md <<EOF
          Container image:
          \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.release_tag }}\`

          OCI Helm chart:
          \`oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts/simply-dashed:${{ steps.version.outputs.release_version }}\`
          EOF

          if ! gh release view "${{ steps.version.outputs.release_tag }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release create "${{ steps.version.outputs.release_tag }}" \
              --repo "${{ github.repository }}" \
              --title "simply-dashed ${{ steps.version.outputs.release_tag }}" \
              --notes-file /tmp/release-notes.md
          fi

          gh release upload "${{ steps.version.outputs.release_tag }}" \
            ".cr-release-packages/simply-dashed-${{ steps.version.outputs.release_version }}.tgz" \
            "simply-dashed-sbom.spdx.json" \
            "trivy-report.txt" \
            --repo "${{ github.repository }}" \
            --clobber
