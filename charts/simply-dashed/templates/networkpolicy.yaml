{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "simply-dashed.fullname" . }}
  labels:
    {{- include "simply-dashed.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "simply-dashed.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- toYaml .Values.networkPolicy.ingress | nindent 4 }}
  egress: []
{{- end }}
